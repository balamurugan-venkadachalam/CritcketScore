# ─── LOCAL PROFILE ──────────────────────────────────────────────────────────
# Runs against a local Kafka (docker-compose or Redpanda) on default port 9092.
# No TLS, no SASL – plain text for developer ergonomics.
# Start local Kafka: docker run --rm -p 9092:9092 redpandadata/redpanda redpanda start

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # Key = matchId (String); Value = ScoreEvent JSON (String)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Reliability settings (same as prod – we always want idempotent behaviour)
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: lz4
        linger.ms: 5
        batch.size: 16384
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
    admin:
      auto-create: true   # Let Spring create topics automatically for local dev

logging:
  level:
    root: DEBUG
    com.crickscore: DEBUG
    org.apache.kafka.clients.producer: INFO
    org.apache.kafka.clients.admin: INFO
    org.springframework.kafka: INFO
