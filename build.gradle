// Root build file – shared config across all subprojects
plugins {
    // 'java' is a core Gradle plugin – applied directly in each subproject
    id 'org.springframework.boot' version '3.4.2' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    group = 'com.crickscore'
    version = '1.0.0-SNAPSHOT'

    java {
        sourceCompatibility = JavaVersion.VERSION_24
        targetCompatibility = JavaVersion.VERSION_24
        toolchain { languageVersion = JavaLanguageVersion.of(24) }
    }

    repositories {
        mavenCentral()
        maven { url 'https://packages.confluent.io/maven/' }
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:3.4.2"
            mavenBom "software.amazon.awssdk:bom:2.29.43"
            mavenBom "io.opentelemetry.instrumentation:opentelemetry-instrumentation-bom:2.12.0"
        }
        // Lombok 1.18.38+ is the first release with Java 24 support.
        // Override the version shipped by the Spring Boot BOM.
        dependencies {
            dependency 'org.projectlombok:lombok:1.18.38'
        }
    }

    // Shared test config
    test {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
    }

    // ── Lombok + Java 24 workaround ───────────────────────────────────────────
    // Java 24 tightened module access. Lombok's annotation processor accesses
    // sun.tools.javac internals and needs these --add-opens to initialise cleanly.
    tasks.withType(JavaCompile).configureEach {
        options.fork = true
        options.forkOptions.jvmArgs += [
            '--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.jvm=ALL-UNNAMED',
        ]
    }

    // UTF-8 everywhere
    compileJava.options.encoding   = 'UTF-8'
    compileTestJava.options.encoding = 'UTF-8'
}
