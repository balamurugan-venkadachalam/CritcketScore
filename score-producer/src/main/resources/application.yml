spring:
  application:
    name: t20-score-producer

  # Profile default if not set externally
  profiles:
    active: local

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8081
  shutdown: graceful
  tomcat:
    connection-timeout: 5s
    threads:
      max: 200
      min-spare: 10

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,prometheus,info,metrics,loggers
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        score.event.send.latency: true
      slo:
        score.event.send.latency: 250ms, 500ms, 1s
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:local}
  tracing:
    sampling:
      probability: 1.0

app:
  kafka:
    topic:
      score-events: t20-match-scores
      retry-1: t20-match-scores-retry-1
      retry-2: t20-match-scores-retry-2
      retry-3: t20-match-scores-retry-3
      dlt: t20-match-scores-dlt
    producer:
      client-id: t20-score-producer-${random.uuid}

logging:
  level:
    root: INFO
    com.crickscore: DEBUG
    org.apache.kafka.clients: WARN
    org.apache.kafka.common: WARN
